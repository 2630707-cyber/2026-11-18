<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKMU & IU 뮤직비디오 재생</title>
    <style>
        /* 1. 배경을 자연스러운 하늘색 그라데이션으로 변경 */
        body {
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #87CEEB 0%, #e0f6ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Malgun Gothic', sans-serif;
            color: #333; /* 배경이 밝아졌으므로 글자색을 어두운 회색으로 변경 */
            box-sizing: border-box;
            overflow-x: hidden; /* 구름이 화면 밖으로 나갈 때 가로 스크롤바 방지 */
            position: relative;
        }

        /* 2. 코드로 직접 만든 뭉게구름 스타일 */
        .cloud {
            background: #fff;
            border-radius: 50px;
            position: absolute;
            width: 350px;
            height: 120px;
            z-index: 0; /* 동영상 뒤쪽 배경으로 배치 */
        }
        /* 구름의 동그란 부분들 만들기 */
        .cloud:after, .cloud:before {
            content: '';
            background: #fff;
            position: absolute;
            z-index: -1;
        }
        .cloud:after {
            width: 100px;
            height: 100px;
            top: -50px;
            left: 50px;
            border-radius: 100px;
        }
        .cloud:before {
            width: 180px;
            height: 180px;
            top: -90px;
            right: 50px;
            border-radius: 200px;
        }

        /* 3. 구름이 흘러가는 애니메이션 설정 */
        @keyframes moveClouds {
            0% { margin-left: -1000px; }
            100% { margin-left: 100vw; }
        }
        /* 각 구름의 크기, 투명도, 떠다니는 속도를 다르게 설정 */
        .cloud1 { top: 10%; transform: scale(0.6); opacity: 0.8; animation: moveClouds 40s linear infinite; }
        .cloud2 { top: 25%; transform: scale(0.4); opacity: 0.6; animation: moveClouds 55s linear infinite; animation-delay: -10s; }
        .cloud3 { top: 5%; transform: scale(0.5); opacity: 0.9; animation: moveClouds 45s linear infinite; animation-delay: -25s; }

        /* 두 영상을 나란히 배치 */
        .video-gallery {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10; /* 영상이 구름보다 앞에 오도록 설정 */
            position: relative;
        }

        .video-item {
            text-align: center;
        }

        .video-title {
            margin-bottom: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8); /* 글자 가독성을 위해 흰색 그림자 추가 */
        }

        /* iframe에 둥근 테두리와 그림자 스타일 적용 */
        iframe {
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 100%;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="video-gallery">
        <div class="video-item">
            <div class="video-title">Akdong Musician(AKMU) - GIVE LOVE M/V</div>
            <iframe 
              width="560" 
              height="315" 
              src="https://www.youtube-nocookie.com/embed/x2XX3cNW4K0?rel=0&modestbranding=1" 
              title="Akdong Musician(AKMU) - GIVE LOVE M/V" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen>
            </iframe>
        </div>

        <div class="video-item">
            <div class="video-title">[MV] IU(아이유) - BBIBBI(삐삐)</div>
            <iframe 
              width="560" 
              height="315" 
              src="https://www.youtube-nocookie.com/embed/nM0xDI5R50E?rel=0&modestbranding=1" 
              title="[MV] IU(아이유) _ BBIBBI(삐삐)" 
              frameborder="0" 
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
              referrerpolicy="strict-origin-when-cross-origin"
              allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
